<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Udaya Digital Services</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}
header{
background:linear-gradient(45deg,#0ea5e9,#6366f1);
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}
input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}
button{
padding:12px;
background:#0ea5e9;
border:none;
color:white;
width:100%;
border-radius:8px;
cursor:pointer;
}
button:hover{background:#0284c7;}
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}
.admin-panel{display:none;}
</style>
</head>
<body>

<header>
Udaya Digital Services  
<br>
<small>Online Xerox | Print | Lamination</small>
</header>

<div class="container">

<div class="card">
<h2>Place Order</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">

<select id="service">
<option value="Xerox">Xerox (₹2 per copy)</option>
<option value="Printout">Printout (₹5 per copy)</option>
<option value="Lamination">Lamination (₹20 per copy)</option>
</select>

<input type="number" id="copies" placeholder="Number of Copies" value="1" oninput="calculateAmount()">
<input type="text" id="amount" placeholder="Total Amount" readonly>

<label>Upload Files (Multiple Allowed)</label>
<input type="file" id="files" multiple>

<button onclick="placeOrder()">Submit & Pay via UPI</button>

<p>UPI: <b>udayalovely2000@okaxis</b></p>
</div>

<div class="card">
<h2>Track Order</h2>
<input type="text" id="trackPhone" placeholder="Enter Phone Number">
<button onclick="trackOrder()">Track</button>
<div id="trackResult"></div>
</div>

<div class="card">
<h2>Admin Login</h2>
<input type="email" id="adminEmail" placeholder="Email">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div class="card admin-panel" id="adminPanel">
<h2>Admin Dashboard</h2>
<div id="ordersList"></div>
</div>

</div>

<a class="whatsapp" href="https://wa.me/919688238987" target="_blank">💬</a>

<script>

const supabase = window.supabase.createClient(
"https://kggycninlwojlsnbhuzd.supabase.co",
"YOUR_NEW_ANON_KEY"
);

function calculateAmount(){
const service=document.getElementById("service").value;
const copies=parseInt(document.getElementById("copies").value)||1;
let price=2;
if(service==="Printout") price=5;
if(service==="Lamination") price=20;
document.getElementById("amount").value=price*copies;
}

async function placeOrder(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const service=document.getElementById("service").value;
const copies=document.getElementById("copies").value;
const amount=document.getElementById("amount").value;
const files=document.getElementById("files").files;

let uploadedUrls=[];

for(let file of files){
const fileName=Date.now()+"_"+file.name;

await supabase.storage
.from("order-files")
.upload(fileName,file);

const { data }=supabase.storage
.from("order-files")
.getPublicUrl(fileName);

uploadedUrls.push(data.publicUrl);
}

await supabase.from("orders").insert([{
customer_name:name,
phone:phone,
service:service,
copies:copies,
amount:amount,
payment_status:"Pending",
order_status:"New",
file_urls:uploadedUrls
}]);

window.location.href="upi://pay?pa=udayalovely2000@okaxis&pn=UdayaDigital&am="+amount;
}

async function trackOrder(){
const phone=document.getElementById("trackPhone").value;
const {data}=await supabase.from("orders").select("*").eq("phone",phone);

let html="";
data.forEach(order=>{
html+=`
<div style="background:#334155;padding:10px;margin:10px 0;border-radius:8px">
<p><b>Service:</b> ${order.service}</p>
<p><b>Copies:</b> ${order.copies}</p>
<p><b>Amount:</b> ₹${order.amount}</p>
<p><b>Status:</b> ${order.order_status}</p>
<p><b>Payment:</b> ${order.payment_status}</p>
</div>`;
});
document.getElementById("trackResult").innerHTML=html;
}

function adminLogin(){
if(
document.getElementById("adminEmail").value==="udayalovely2000@gmail.com" &&
document.getElementById("adminPass").value==="123456"
){
document.getElementById("adminPanel").style.display="block";
loadOrders();
}else{
alert("Invalid Login");
}
}

async function loadOrders(){
const {data}=await supabase.from("orders").select("*").order("created_at",{ascending:false});

let html="";
data.forEach(order=>{
html+=`
<div style="background:#334155;padding:10px;margin:10px 0;border-radius:8px">
<p><b>Name:</b> ${order.customer_name}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Service:</b> ${order.service}</p>
<p><b>Copies:</b> ${order.copies}</p>
<p><b>Amount:</b> ₹${order.amount}</p>
<p><b>Status:</b> ${order.order_status}</p>
<p><b>Payment:</b> ${order.payment_status}</p>
<button onclick="updateStatus('${order.id}','Completed')">Mark Completed</button>
<hr>
</div>`;
});
document.getElementById("ordersList").innerHTML=html;
}

async function updateStatus(id,status){
await supabase.from("orders").update({order_status:status}).eq("id",id);
loadOrders();
}

calculateAmount();

</script>
</body>
</html>
